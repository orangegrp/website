<svg
  xmlns="http://www.w3.org/2000/svg"
  width="200"
  height="200"
  viewBox="0 0 200 200"
  fill="none"
>
  <defs>
    <pattern id="pride-bands" width="240" height="84" patternUnits="userSpaceOnUse" patternTransform="rotate(-18 100 100)">
      <g>
        <animateTransform
          attributeName="transform"
          type="translate"
          from="0 0"
          to="0 84"
          dur="5s"
          repeatCount="indefinite"
        />
        <rect width="240" height="14" y="0" fill="#E40303" />
        <rect width="240" height="14" y="14" fill="#FF8C00" />
        <rect width="240" height="14" y="28" fill="#FFED00" />
        <rect width="240" height="14" y="42" fill="#008026" />
        <rect width="240" height="14" y="56" fill="#004DFF" />
        <rect width="240" height="14" y="70" fill="#750787" />
      </g>
    </pattern>

    <filter id="polygon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3.5" flood-color="white" flood-opacity="0.2" />
    </filter>
  </defs>

  <g filter="url(#polygon-glow)" stroke="white" stroke-width="3" stroke-linejoin="round">
    <polygon points="100,18 168,136 32,136" fill="url(#pride-bands)" />
    <polygon points="100,40 148,124 52,124" fill="none" stroke-opacity="0.6" />
    <polygon points="100,64 129,114 71,114" fill="none" stroke-opacity="0.55" />
    <polygon points="100,82 114,106 86,106" fill="none" stroke-opacity="0.5" />
  </g>
</svg>
